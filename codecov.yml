codecov:
  require_ci_to_pass: true
  notify:
    wait_for_ci: true

coverage:
  precision: 2
  round: down
  range: "60...90"
  status:
    project:
      default:
        target: auto
        threshold: 1%
        if_ci_failed: error
    patch:
      default:
        target: 70%
        threshold: 5%

comment:
  layout: "header, diff, flags, files, footer"
  behavior: default
  require_changes: false

ignore:
  - "cmd/bench/**"
  - "cmd/server/**"
  - "integration_test/**"
  - "migrations/**"
  - "deploy/**"
  - "scripts/**"
  - "**/*_test.go"
  - "**/mocks/**"
