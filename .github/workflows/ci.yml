name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read
  pull-requests: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'
          cache: true

      - name: go mod verify
        run: go mod verify

      - name: Build server + bench
        run: |
          go build -o /dev/null ./cmd/server
          go build -o /dev/null ./cmd/bench

  lint:
    name: Lint
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'
          cache: true

      - uses: golangci/golangci-lint-action@v8
        with:
          version: v2.11.4
          args: --timeout=5m

  # test and integration both fan out from lint and run in parallel.
  # Each emits its own coverage profile and uploads under a distinct
  # Codecov flag — Codecov merges them into a combined report.
  test:
    name: Unit tests + coverage
    needs: lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'
          cache: true

      - name: Unit tests
        run: make unittest

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v6
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: ./coverage.out
          flags: unittests
          fail_ci_if_error: false

  integration:
    name: Integration tests + coverage
    needs: lint
    runs-on: ubuntu-latest
    # Integration tests bring up MySQL + Redis + Kafka in real containers via
    # testcontainers-go inside the test process. The GitHub-hosted runner
    # already exposes a working Docker daemon, so no `services:` block is
    # needed. Skipped on PRs from forks (no secrets, Docker-in-Docker is
    # slower there).
    if: github.event_name == 'push' || github.event.pull_request.head.repo.full_name == github.repository

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'
          cache: true

      - name: Pull required images (warm Docker cache)
        run: |
          docker pull mysql:8.0 &
          docker pull redis:7.4-alpine &
          docker pull confluentinc/confluent-local:7.6.0 &
          wait

      - name: Run integration tests
        run: make inttest

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v6
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: ./coverage-integration.out
          flags: integration
          fail_ci_if_error: false
